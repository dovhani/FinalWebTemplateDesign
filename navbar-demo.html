<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar with Semi-Circle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1a1a2e;
            color: #ffffff;
            padding: 0 2rem;
            height: 70px;
            position: relative;
            overflow: hidden;
        }

        /* Semi-circle on the far left */
        .navbar::before {
            content: '';
            position: absolute;
            left: -35px; /* Half of the circle's diameter to make it protrude */
            width: 70px;
            height: 70px;
            background-color: #1a1a2e;
            border-radius: 50%;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            margin-left: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            z-index: 1;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            z-index: 1;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 4px;
        }

        .nav-links a:hover {
            color: #4ecca3;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 1;
        }

        .btn {
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-primary {
            background-color: #4ecca3;
            color: #1a1a2e;
        }

        .btn-primary:hover {
            background-color: #3db892;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Mobile menu toggle */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            z-index: 1;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background-color: #ffffff;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 1rem;
            }

            .menu-toggle {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 70px;
                left: 0;
                right: 0;
                background-color: #1a1a2e;
                flex-direction: column;
                padding: 2rem;
                gap: 1rem;
                transform: translateY(-100%);
                opacity: 0;
                transition: all 0.3s ease;
                pointer-events: none;
            }

            .nav-links.active {
                transform: translateY(0);
                opacity: 1;
                pointer-events: all;
            }

            .nav-actions {
                display: none;
            }

            .nav-links .btn {
                width: 100%;
                text-align: center;
            }
        }

        /* Hero Section */
        .hero {
            min-height: 80vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #ffffff;
            padding: 2rem;
        }

        .hero-content {
            max-width: 800px;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            margin-top: 20px;
            font-weight: 700;
        }

        .hero p {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .hero p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <!-- Semi-circle is created via ::before pseudo-element -->
        <a href="#" class="nav-brand">Logo</a>
        
        <ul class="nav-links" id="navLinks">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
            <li><a href="#login" class="btn btn-secondary">Login</a></li>
            <li><a href="#signup" class="btn btn-primary">Sign Up</a></li>
        </ul>

        <div class="nav-actions">
            <a href="#login" class="btn btn-secondary">Login</a>
            <a href="#signup" class="btn btn-primary">Sign Up</a>
        </div>

        <div class="menu-toggle" id="menuToggle" aria-label="Toggle navigation menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to Our Website</h1>
            <p>Discover amazing things with our innovative solutions</p>
            <a href="#get-started" class="btn btn-primary">Get Started</a>
        </div>
    </section>

    <script>
        // Simple mobile menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
